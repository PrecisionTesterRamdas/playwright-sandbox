<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playwright File Upload Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-2xl bg-white rounded-xl shadow-lg p-8">
      <h2 class="text-2xl font-bold text-gray-800 mb-6">
        Playwright Upload Demo
      </h2>

      <form class="space-y-6" id="uploadForm">
        <div class="border rounded-lg p-5 bg-gray-50 border-gray-200">
          <label class="block text-sm font-semibold text-gray-700 mb-2"
            >1. Single File Upload</label
          >
          <input
            type="file"
            id="singleFile"
            data-testid="single-file-input"
            class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 transition-colors"
          />
          <p id="single-status" class="text-sm mt-3 text-gray-500 italic">
            Status: No file chosen
          </p>
        </div>

        <div class="border rounded-lg p-5 bg-gray-50 border-gray-200">
          <label class="block text-sm font-semibold text-gray-700 mb-2"
            >2. Multiple Files Upload</label
          >
          <input
            type="file"
            id="multiFiles"
            multiple
            data-testid="multi-file-input"
            class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-green-100 file:text-green-700 hover:file:bg-green-200 transition-colors"
          />
          <p id="multi-status" class="text-sm mt-3 text-gray-500 italic">
            Status: No files chosen
          </p>
        </div>

        <div class="border rounded-lg p-5 bg-gray-50 border-gray-200">
          <div class="mb-2">
            <label class="block text-sm font-semibold text-gray-700"
              >3. Buffer Upload</label
            >
            <span class="text-xs text-gray-500"
              >Practice passing a memory buffer via Playwright instead of a
              physical file.</span
            >
          </div>
          <input
            type="file"
            id="bufferFile"
            data-testid="buffer-file-input"
            class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-purple-100 file:text-purple-700 hover:file:bg-purple-200 transition-colors"
          />
          <p id="buffer-status" class="text-sm mt-3 text-gray-500 italic">
            Status: No file chosen
          </p>
        </div>

        <button
          type="submit"
          id="submitBtn"
          class="w-full bg-gray-800 hover:bg-gray-900 text-white font-semibold py-3 rounded-lg transition-colors shadow-md"
        >
          Submit Form
        </button>
      </form>
    </div>

    <script>
      // Helper function to update the status text for Playwright assertions
      function attachListener(inputId, statusId) {
        const inputElement = document.getElementById(inputId);
        const statusElement = document.getElementById(statusId);

        inputElement.addEventListener("change", (e) => {
          const files = e.target.files;
          if (files.length === 0) {
            statusElement.textContent = "Status: No file(s) chosen";
            statusElement.classList.remove("text-green-600", "font-medium");
            statusElement.classList.add("text-gray-500", "italic");
          } else {
            // Extract file names and join them
            const fileNames = Array.from(files)
              .map((f) => f.name)
              .join(", ");
            statusElement.textContent = `Status: Selected -> ${fileNames}`;
            statusElement.classList.remove("text-gray-500", "italic");
            statusElement.classList.add("text-green-600", "font-medium");
          }
        });
      }

      // Attach listeners to all inputs
      attachListener("singleFile", "single-status");
      attachListener("multiFiles", "multi-status");
      attachListener("bufferFile", "buffer-status");

      // Prevent actual form submission for demo purposes
      document.getElementById("uploadForm").addEventListener("submit", (e) => {
        e.preventDefault();
        alert("Form submitted! Check your Playwright trace or console.");
      });
    </script>
  </body>
</html>
